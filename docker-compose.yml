services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # PostgreSQL ejecuta estos scripts solo cuando el volumen de datos se crea por primera vez.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -tAc 'SELECT 1 FROM retailmax_init_ready WHERE id = 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - retailmax_net

  postgres-ready:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    command: >
      sh -ec "
      until psql -h postgres -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\" -tAc 'SELECT 1' >/dev/null 2>&1; do
      sleep 2; done;
      pedidos=$$(psql -h postgres -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\" -tAc
      'SELECT COUNT(*) FROM pedido' 2>/dev/null || echo 0);
      detalles=$$(psql -h postgres -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\" -tAc
      'SELECT COUNT(*) FROM detalle_pedido' 2>/dev/null || echo 0);
      if [ \"$$pedidos\" = '0' ] || [ \"$$detalles\" = '0' ]; then
      echo 'Base RetailMax incompleta; recargando schema y datos.';
      psql -v ON_ERROR_STOP=1 -h postgres -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\"
      -f /docker-entrypoint-initdb.d/01_schema.sql;
      psql -v ON_ERROR_STOP=1 -h postgres -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\"
      -f /docker-entrypoint-initdb.d/02_data.sql;
      fi;
      psql -v ON_ERROR_STOP=1 -h postgres -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\"
      -f /docker-entrypoint-initdb.d/03_ready.sql"
    restart: on-failure:5
    networks:
      - retailmax_net

  metabase:
    image: metabase/metabase:v0.50.31
    restart: unless-stopped
    depends_on:
      postgres-ready:
        condition: service_completed_successfully
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase
      JAVA_TIMEZONE: ${JAVA_TIMEZONE}
      JAVA_OPTS: "-Xms128m -Xmx768m"
    ports:
      - "${METABASE_PORT}:3000"
    volumes:
      # H2 guarda usuarios, preguntas, tabs y dashboard en esta carpeta local.
      - ./metabase-data:/metabase-data
    networks:
      - retailmax_net

  metabase-setup:
    image: python:3.12-alpine
    depends_on:
      postgres-ready:
        condition: service_completed_successfully
      metabase:
        condition: service_started
    environment:
      MB_URL: http://metabase:3000
      MB_ADMIN_EMAIL: ${MB_ADMIN_EMAIL}
      MB_ADMIN_PASSWORD: ${MB_ADMIN_PASSWORD}
      MB_ADMIN_FIRST_NAME: ${MB_ADMIN_FIRST_NAME}
      MB_ADMIN_LAST_NAME: ${MB_ADMIN_LAST_NAME}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./metabase-provisioning:/app:ro
      - ./metabase-data:/metabase-data
    command: ["python", "/app/provision_metabase.py"]
    restart: on-failure:5
    networks:
      - retailmax_net

volumes:
  postgres-data:

networks:
  retailmax_net:
    driver: bridge
